name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      # Optional LaTeX → PDF compile. The workflow does NOT block on
      # LaTeX availability; if the compile fails, the site builds
      # without the CV and the /about/ download links will 404 until
      # Cyrille drops prebuilt PDFs in public/cv/.
      - name: Compile CV (optional)
        id: cv
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends texlive-latex-base texlive-latex-extra latexmk
          mkdir -p public/cv
          cd CV_CYRILLE_TABE_comments_oeucu
          latexmk -pdf -interaction=nonstopmode main.tex || true
          [ -f main.pdf ] && cp main.pdf ../public/cv/cyrille-tabe-cv-en.pdf || true

      - name: Build site
        env:
          # Defaults target the project site at
          # https://cytab.github.io/personal_website/. Override with
          # repo-level Variables (Settings → Secrets and variables →
          # Actions → Variables) if moving to a custom domain or a
          # different repo.
          SITE_URL: ${{ vars.SITE_URL || 'https://cytab.github.io' }}
          BASE_PATH: ${{ vars.BASE_PATH || '/personal_website/' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
